<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PassPulse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>PassPulse</h1>
    <p class="subtitle">Check your password strength in real time</p>

    <div class="input-wrapper">
      <input type="password" id="password" placeholder="Enter your password..." autocomplete="off"/>
      <button id="toggle">👁</button>
    </div>

    <div class="meter">
      <div class="bar" id="bar"></div>
    </div>
    <p id="label">Waiting...</p>

    <ul id="criteria">
      <li id="c-length"><span class="dot"></span>8+ characters</li>
      <li id="c-upper"><span class="dot"></span>Uppercase letter</li>
      <li id="c-lower"><span class="dot"></span>Lowercase letter</li>
      <li id="c-number"><span class="dot"></span>Number (0–9)</li>
      <li id="c-symbol"><span class="dot"></span>Symbol (!@#$...)</li>
      <li id="c-long"><span class="dot"></span>16+ characters</li>
    </ul>

    <p id="tip">Start typing to see feedback.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
